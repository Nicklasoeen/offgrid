<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offgrid | Log in</title>
    <meta
      name="description"
      content="Log in to Offgrid and connect with fellow adventurers and explorers."
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body data-page="login">
    <div class="auth-shell">
      <section class="auth-intro">
        <div class="auth-brand">
          <img
            class="brand-logo brand-logo-large"
            src="/assets/offgrid-icon.png"
            alt="Offgrid logo"
          />
          <p class="eyebrow">Offgrid</p>
        </div>
        <h1>Welcome back</h1>
        <p class="intro">
          Log in to see your feed, share new trips, and keep up with other
          people who would rather be outside.
        </p>
        <a class="text-link" href="/index.html">Back to feed preview</a>
      </section>

      <main class="auth-card">
        <div class="section-heading compact">
          <div>
            <p class="eyebrow">Account</p>
            <h2>Log in</h2>
          </div>
        </div>

        <form class="stacked-form" aria-label="Login form">
          <label>
            Email
            <input
              type="email"
              name="email"
              placeholder="name@stud.noroff.no"
              required
            />
          </label>

          <label>
            Password
            <input
              type="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </label>

          <button class="button" type="submit">Log in</button>
        </form>

        <p class="form-helper">
          New here?
          <a class="text-link" href="/register.html">Create an account</a>
        </p>
      </main>
    </div>
  </body>
</html>
